<div class="feed">
  <h1>{{ i18n.t('feed.title') }}</h1>

  @if (loading()) {
    <p class="loading">{{ i18n.t('feed.loading') }}</p>
  } @else if (posts().length === 0) {
    <div class="empty-state">
      <p>{{ i18n.t('feed.empty') }}</p>
      <p>{{ i18n.t('feed.joinGroups') }}</p>
    </div>
  } @else {
    @for (post of posts(); track post.id) {
      <app-post-card [post]="post" [showGroup]="true" />
    }
  }
</div>
